<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @media (prefers-color-scheme: light) {
      .fg { color: #1d1d1f; }
    }
    @media (prefers-color-scheme: dark) {
      .fg { color: #fbfbfd; }
    }
  </style>
  <!--
    芯师爷 Favicon — 晶圆环 × 翻页（方案 B）

    设计语言：
    - 圆环 = 晶圆（wafer），代表半导体产业
    - 底部缺口的折叠线 = 翻开的一页，代表媒体叙事
    - 中心十字 = 精密切割线（die cuts），代表技术精度
    - 无文字、纯几何，16×16 零像素损失
  -->
  <g class="fg" transform="rotate(-45 16 16)">
    <!-- 晶圆环 outer arc: 从顶部顺时针到缺口边缘 -->
    <path fill="currentColor" fill-rule="evenodd" d="
      M 16 3
      A 13 13 0 0 1 19.36 28.56
      L 18.59 25.66
      A 10 10 0 0 0 16 6
      Z
    "/>
    <!-- 翻页折痕 -->
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7" d="
      M 19.36 28.56
      Q 16.5 28 17 25.66
    "/>
  </g>
  <!-- 中心切割线（保持不旋转） -->
  <g class="fg" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <path d="M 12 12 L 20 20"/>
    <path d="M 20 12 L 12 20"/>
  </g>
</svg>
